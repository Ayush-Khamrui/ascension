<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Project Ascension logo">
  <defs>
    <linearGradient id="lg-core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="lg-edge" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="lg-glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="lg-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <circle cx="160" cy="150" r="150" fill="url(#lg-glow)"/>

  <!-- ascending faceted chevron crystal -->
  <g filter="url(#lg-blur)" opacity="0.7">
    <path d="M160 46 L262 214 L160 170 L58 214 Z" fill="url(#lg-core)"/>
  </g>

  <!-- main upper crystal -->
  <path d="M160 46 L262 214 L160 170 L58 214 Z" fill="url(#lg-core)"/>
  <path d="M160 46 L160 170 L58 214 Z" fill="#0b1020" fill-opacity="0.18"/>
  <path d="M160 46 L262 214 L160 170 Z" fill="#ffffff" fill-opacity="0.10"/>

  <!-- lower ascension bars -->
  <path d="M96 236 L224 236 L196 264 L124 264 Z" fill="url(#lg-edge)" opacity="0.9"/>
  <path d="M120 280 L200 280 L182 300 L138 300 Z" fill="url(#lg-edge)" opacity="0.55"/>

  <!-- core spark -->
  <circle cx="160" cy="150" r="13" fill="#ffffff"/>
  <circle cx="160" cy="150" r="22" fill="none" stroke="#e0f2fe" stroke-width="2" opacity="0.5"/>

  <!-- outline -->
  <path d="M160 46 L262 214 L160 170 L58 214 Z" fill="none" stroke="url(#lg-edge)" stroke-width="3" stroke-linejoin="round"/>
</svg>
